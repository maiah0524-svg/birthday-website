<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Box</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;500;600&family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="blind-page">

    <div class="checklist">
        <h1>BLIND BOX</h1>
        <p>collect all 12 jareds ♡</p>

        <div id="checkboxes"></div>
    </div>

    <div class="blind-stage">
        <p id="caption">click the button to unbox a jared...</p>

        <img id="mainBox" src="blind-box.png" alt="blind box">

        <button id="openButton">open box</button>
    </div>

    <div class="collection">
        <h2>unboxed collection</h2>
        <div id="collectionRow"></div>
    </div>

    <a href="index.html" class="takeout-box">
        <div class="takeout-text">
            would you like<br>
            to take this to go?
        </div>

        <img src="closed-box.png" class="closed-box" alt="closed takeout box">
        <img src="open-box.png" class="open-box" alt="open takeout box">
    </a>

    <script>
        const items = [
            { file: "crying-jared.png", caption: "crying jared unlocked!" },
            { file: "windswept-jared.png", caption: "windswept jared unlocked!" },
            { file: "wet-jared.png", caption: "wet jared unlocked!" },
            { file: "woke-jared.png", caption: "woke jared unlocked!" },
            { file: "polite-jared.png", caption: "polite jared unlocked!" },
            { file: "maia-jared.png", caption: "you found the rarest jared! congratulations. maia & jared set unlocked!", rare: true },
            { file: "dead-wife-jared.png", caption: "dead wife jared unlocked!" },
            { file: "itchy-jared.png", caption: "itchy jared unlocked!" },
            { file: "woodstock-jared.png", caption: "woodstock jared unlocked!" },
            { file: "aesthetic-jared.png", caption: "aesthetic jared unlocked!" },
            { file: "headshot-jared.png", caption: "headshot jared unlocked!" },
            { file: "sleepy-jared.png", caption: "sleepy jared unlocked!" }
        ];

        let remaining = [...items];
        let currentItem = null;

        const mainBox = document.getElementById("mainBox");
        const caption = document.getElementById("caption");
        const button = document.getElementById("openButton");
        const checkboxes = document.getElementById("checkboxes");
        const collectionRow = document.getElementById("collectionRow");

        items.forEach((item, index) => {
            const row = document.createElement("div");
            row.classList.add("check-row");

            row.innerHTML = `
                <img id="check-${index}" src="unchecked.png" alt="unchecked">
                <span>${index + 1}</span>
            `;

            checkboxes.appendChild(row);
        });

        button.addEventListener("click", () => {
            mainBox.removeAttribute("class");

            if (currentItem !== null) {
                addToCollection(currentItem);
                currentItem = null;
                mainBox.src = "blind-box.png";
                caption.textContent = "click the box to unbox another jared...";
            }

            if (remaining.length === 0) {
                caption.textContent = "you collected every jared ♡";
                button.textContent = "complete!";
                button.disabled = true;
                return;
            }

            mainBox.classList.add("shake");

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * remaining.length);
                const chosen = remaining.splice(randomIndex, 1)[0];

                currentItem = chosen;

                mainBox.src = chosen.file;
                caption.textContent = chosen.caption;

                const originalIndex = items.findIndex(item => item.file === chosen.file);
                document.getElementById(`check-${originalIndex}`).src = "checked.png";

                mainBox.removeAttribute("class");

                if (chosen.rare) {
                    mainBox.classList.add("rare-item");
                } else {
                    mainBox.classList.add("revealed-item");
                }
            }, 650);
        });

        function addToCollection(item) {
            const img = document.createElement("img");
            img.src = item.file;
            img.alt = item.caption;
            img.classList.add("collection-img");

            if (item.rare) {
                img.classList.add("rare-small");
            }

            collectionRow.appendChild(img);
        }
    </script>

</body>

</html>
